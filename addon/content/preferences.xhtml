<linkset>
  <html:link rel="localization" href="__addonRef__-addon.ftl" />
  <html:script src="chrome://__addonRef__/content/preferences.js" />
</linkset>
<groupbox>
  <label><html:h2 data-l10n-id="zoteroAIRreader-pref-title"></html:h2></label>

  <!-- Enable/Disable -->
  <checkbox
    id="zotero-prefpane-__addonRef__-enable"
    preference="enable"
    data-l10n-id="zoteroAIRreader-pref-enable"
  />

  <!-- ══�?Chat LLM Configuration ══�?-->
  <label><html:h3 data-l10n-id="zoteroAIRreader-pref-section-chat"></html:h3></label>
  <html:p data-l10n-id="zoteroAIRreader-pref-section-chat-desc" style="color: #666; font-size: 12px; margin: 0 0 8px 0;"></html:p>

  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-provider"
      data-l10n-id="zoteroAIRreader-pref-llm-provider"
      style="width: 140px;"
    ></html:label>
    <menulist
      id="zotero-prefpane-__addonRef__-provider"
      preference="llmProvider"
      style="min-width: 200px;"
    >
      <menupopup>
        <menuitem label="Ollama (local)" value="ollama" />
        <menuitem label="LM Studio (local)" value="lmstudio" />
        <menuitem label="DeepSeek" value="deepseek" />
        <menuitem label="OpenAI" value="openai" />
        <menuitem label="OpenAI Compatible" value="openai-compatible" />
      </menupopup>
    </menulist>
  </hbox>

  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-api-base-url"
      data-l10n-id="zoteroAIRreader-pref-api-base-url"
      style="width: 140px;"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-api-base-url"
      preference="apiBaseUrl"
      placeholder="Leave empty for default"
      style="flex: 1; min-width: 250px;"
    ></html:input>
  </hbox>

  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-api-key"
      data-l10n-id="zoteroAIRreader-pref-api-key"
      style="width: 140px;"
    ></html:label>
    <html:input
      type="password"
      id="zotero-prefpane-__addonRef__-api-key"
      preference="apiKey"
      placeholder="sk-... (not needed for Ollama)"
      style="flex: 1; min-width: 250px;"
    ></html:input>
  </hbox>

  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-model"
      data-l10n-id="zoteroAIRreader-pref-model-name"
      style="width: 140px;"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-model"
      preference="modelName"
      placeholder="e.g. deepseek-chat, gpt-4o-mini, llama3"
      style="flex: 1; min-width: 250px;"
    ></html:input>
  </hbox>

  <hbox align="center" style="margin-top: 8px;">
    <html:div style="width: 140px;"></html:div>
    <html:button
      id="zotero-prefpane-__addonRef__-test-chat"
      data-l10n-id="zoteroAIRreader-pref-test-chat"
      style="min-width: 120px;"
    ></html:button>
    <html:span
      id="zotero-prefpane-__addonRef__-test-chat-result"
      style="margin-left: 12px; color: #666;"
    ></html:span>
  </hbox>

  <separator class="thin" />

  <!-- ══�?Embedding Configuration (Optional) ══�?-->
  <label><html:h3 data-l10n-id="zoteroAIRreader-pref-section-embedding"></html:h3></label>
  <html:p data-l10n-id="zoteroAIRreader-pref-section-embedding-desc" style="color: #666; font-size: 12px; margin: 0 0 8px 0;"></html:p>

<checkbox
    id="zotero-prefpane-__addonRef__-embedding-enabled"
    preference="embeddingEnabled"
    data-l10n-id="zoteroAIRreader-pref-embedding-enabled"
  />

  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-indexing-mode"
      data-l10n-id="zoteroAIRreader-pref-indexing-mode"
      style="width: 140px;"
    ></html:label>
    <menulist
      id="zotero-prefpane-__addonRef__-indexing-mode"
      preference="indexingMode"
      style="min-width: 200px;"
    >
      <menupopup>
        <menuitem label="Manual (click to index)" value="manual" />
        <menuitem label="Auto (index on open)" value="auto" />
      </menupopup>
    </menulist>
  </hbox>

  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-embedding-provider"
      data-l10n-id="zoteroAIRreader-pref-embedding-provider"
      style="width: 140px;"
    ></html:label>
    <menulist
      id="zotero-prefpane-__addonRef__-embedding-provider"
      preference="embeddingProvider"
      style="min-width: 200px;"
    >
      <menupopup>
        <menuitem label="Same as chat model" value="same" />
        <menuitem label="Ollama (local)" value="ollama" />
        <menuitem label="LM Studio (local)" value="lmstudio" />
        <menuitem label="DeepSeek" value="deepseek" />
        <menuitem label="OpenAI" value="openai" />
        <menuitem label="OpenAI Compatible" value="openai-compatible" />
      </menupopup>
    </menulist>
  </hbox>

  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-embedding-base-url"
      data-l10n-id="zoteroAIRreader-pref-embedding-base-url"
      style="width: 140px;"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-embedding-base-url"
      preference="embeddingBaseUrl"
      placeholder="Leave empty to use chat model server"
      style="flex: 1; min-width: 250px;"
    ></html:input>
  </hbox>

  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-embedding-api-key"
      data-l10n-id="zoteroAIRreader-pref-embedding-api-key"
      style="width: 140px;"
    ></html:label>
    <html:input
      type="password"
      id="zotero-prefpane-__addonRef__-embedding-api-key"
      preference="embeddingApiKey"
      placeholder="Leave empty to use chat model API key"
      style="flex: 1; min-width: 250px;"
    ></html:input>
  </hbox>

  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-embedding-model"
      data-l10n-id="zoteroAIRreader-pref-embedding-model"
      style="width: 140px;"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-embedding-model"
      preference="embeddingModel"
      placeholder="e.g. nomic-embed-text, text-embedding-3-small"
      style="flex: 1; min-width: 250px;"
    ></html:input>
  </hbox>

  <hbox align="center" style="margin-top: 8px;">
    <html:div style="width: 140px;"></html:div>
    <html:button
      id="zotero-prefpane-__addonRef__-test-embedding"
      data-l10n-id="zoteroAIRreader-pref-test-embedding"
      style="min-width: 120px;"
    ></html:button>
    <html:span
      id="zotero-prefpane-__addonRef__-test-embedding-result"
      style="margin-left: 12px; color: #666;"
    ></html:span>
  </hbox>

  <checkbox
    id="zotero-prefpane-__addonRef__-auto-index"
    preference="autoIndex"
    data-l10n-id="zoteroAIRreader-pref-auto-index"
  />

  <separator class="thin" />

  <!-- ══�?Feature Configuration ══�?-->
  <label><html:h3 data-l10n-id="zoteroAIRreader-pref-section-features"></html:h3></label>

  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-language"
      data-l10n-id="zoteroAIRreader-pref-language"
      style="width: 140px;"
    ></html:label>
    <menulist
      id="zotero-prefpane-__addonRef__-language"
      preference="language"
      style="min-width: 200px;"
    >
      <menupopup>
        <menuitem label="中文" value="zh" />
        <menuitem label="English" value="en" />
      </menupopup>
    </menulist>
  </hbox>

  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-history-rounds"
      data-l10n-id="zoteroAIRreader-pref-history-rounds"
      style="width: 140px;"
    ></html:label>
    <html:input
      type="number"
      id="zotero-prefpane-__addonRef__-history-rounds"
      preference="historyRounds"
      min="1"
      max="50"
      style="width: 80px;"
    ></html:input>
  </hbox>

  <separator class="thin" />

  <!-- ══�?Annotation Configuration ══�?-->
  <label><html:h3 data-l10n-id="zoteroAIRreader-pref-section-annotations"></html:h3></label>

  <checkbox
    id="zotero-prefpane-__addonRef__-auto-highlight"
    preference="autoHighlight"
    data-l10n-id="zoteroAIRreader-pref-auto-highlight"
  />

  <hbox align="center">
    <html:label
      data-l10n-id="zoteroAIRreader-pref-color-summary"
      style="width: 60px;"
    ></html:label>
    <html:input type="color" preference="colorSummary" style="width: 40px; height: 22px;" />
    <html:label data-l10n-id="zoteroAIRreader-pref-color-concept" style="width: 60px; margin-left: 12px;" />
    <html:input type="color" preference="colorConcept" style="width: 40px; height: 22px;" />
    <html:label data-l10n-id="zoteroAIRreader-pref-color-argument" style="width: 60px; margin-left: 12px;" />
    <html:input type="color" preference="colorArgument" style="width: 40px; height: 22px;" />
  </hbox>

  <hbox align="center">
    <html:label data-l10n-id="zoteroAIRreader-pref-color-characters" style="width: 60px;" />
    <html:input type="color" preference="colorCharacters" style="width: 40px; height: 22px;" />
    <html:label data-l10n-id="zoteroAIRreader-pref-color-quotes" style="width: 60px; margin-left: 12px;" />
    <html:input type="color" preference="colorQuotes" style="width: 40px; height: 22px;" />
    <html:label data-l10n-id="zoteroAIRreader-pref-color-guide" style="width: 60px; margin-left: 12px;" />
    <html:input type="color" preference="colorGuide" style="width: 40px; height: 22px;" />
  </hbox>

</groupbox>
<vbox>
  <html:label
    data-l10n-id="zoteroAIRreader-pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
