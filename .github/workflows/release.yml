name: Build and Release

on:
  push:
    tags:
      - v**

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Prepare build directory
        run: |
          mkdir -p .scaffold/build/addon/content/scripts
          mkdir -p .scaffold/build/src
          mkdir -p .scaffold/build/src/modules
          mkdir -p .scaffold/build/src/utils

      - name: Build TypeScript with esbuild
        run: |
          npx esbuild src/index.ts \
            --bundle \
            --target firefox115 \
            --outfile=.scaffold/build/addon/content/scripts/zoteroAIRreader.js \
            --define:__env='"production"'

      - name: Process manifest.json
        run: |
          sed -i 's/__addonName__/Zotero AI Reader/g' addon/manifest.json
          sed -i 's/__buildVersion__/${TAG_NAME#v}/g' addon/manifest.json
          sed -i 's/__description__/AI-powered PDF reader for Zotero/g' addon/manifest.json
          sed -i 's/__homepage__/https:\/\/github.com\/Callioper\/zotero-aireader/g' addon/manifest.json
          sed -i 's/__author__/Callioper/g' addon/manifest.json
          sed -i 's/__addonID__/zotero-ai-reader@callioper/g' addon/manifest.json
          sed -i 's/__updateURL__/https:\/\/github.com\/Callioper\/zotero-aireader\/releases\/download\/release\/update.json/g' addon/manifest.json
          echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Copy addon files
        run: |
          cp addon/manifest.json .scaffold/build/addon/
          cp -r addon/content .scaffold/build/addon/
          cp -r addon/locale .scaffold/build/addon/
          cp addon/bootstrap.js .scaffold/build/addon/
          cp addon/prefs.js .scaffold/build/addon/

      - name: Show build output
        run: ls -la .scaffold/build/addon/

      - name: Create xpi archive
        run: |
          cd .scaffold/build/addon
          zip -r ../../zotero-ai-reader.xpi .
          cd ../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build
          path: .scaffold/build/zotero-ai-reader.xpi

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-build
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.xpi"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
