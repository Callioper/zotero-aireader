name: Build and Release

on:
  push:
    tags:
      - v**

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: |
          mkdir -p .scaffold/build/addon/content/scripts
          ./node_modules/.bin/esbuild src/index.ts \
            --bundle \
            --target=firefox115 \
            --outfile=.scaffold/build/addon/content/scripts/zoteroAIRreader.js \
            --define:__env='"production"' \
            --external:zotero-plugin-toolkit

      - name: Process manifest.json
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          sed -i 's/__addonName__/Zotero AI Reader/g' addon/manifest.json
          sed -i "s/__buildVersion__/${TAG_NAME#v}/g" addon/manifest.json
          sed -i 's/__description__/AI-powered PDF reader for Zotero/g' addon/manifest.json
          sed -i 's/__homepage__/https:\/\/github.com\/Callioper\/zotero-aireader/g' addon/manifest.json
          sed -i 's/__author__/Callioper/g' addon/manifest.json
          sed -i 's/__addonID__/zotero-ai-reader@callioper/g' addon/manifest.json
          sed -i 's/__updateURL__/https:\/\/github.com\/Callioper\/zotero-aireader\/releases\/download\/release\/update.json/g' addon/manifest.json

      - name: Copy and process addon files
        run: |
          cp addon/manifest.json .scaffold/build/addon/
          cp -r addon/content .scaffold/build/addon/
          cp -r addon/locale .scaffold/build/addon/
          cp addon/bootstrap.js .scaffold/build/addon/
          cp addon/prefs.js .scaffold/build/addon/
          find .scaffold/build/addon -name "*.xhtml" -exec sed -i 's/__addonRef__/zoteroAIRreader/g' {} \;

      - name: Show build output
        run: ls -la .scaffold/build/addon/content/scripts/

      - name: Create xpi archive
        run: |
          ls -la .scaffold/build/addon/
          cd .scaffold/build/addon
          zip -r ../zotero-ai-reader.xpi .
          ls -la ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build
          path: .scaffold/build/zotero-ai-reader.xpi

      - name: Create update.json
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION=${TAG_NAME#v}
          OWNER=Callioper
          REPO=zotero-aireader
          HASH=$(sha256sum .scaffold/build/zotero-ai-reader.xpi | cut -d' ' -f1)
          printf '{"addons":{"zotero-ai-reader@callioper":{"updates":[{"version":"%s","update_link":"https://github.com/%s/%s/releases/download/%s/zotero-ai-reader.xpi","update_hash":"sha256:%s","applications":{"zotero":{"strict_min_version":"6.999","strict_max_version":"9.*"}}}]}}}' "$VERSION" "$OWNER" "$REPO" "$TAG_NAME" "$HASH" > update.json
          cat update.json

      - name: Upload update.json
        uses: actions/upload-artifact@v4
        with:
          name: update-json
          path: update.json

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-build
          path: .

      - name: Download update.json artifact
        uses: actions/download-artifact@v4
        with:
          name: update-json
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.xpi" "update.json"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}