<linkset>
  <html:link rel="localization" href="zoteroAIRreader-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>
  <checkbox
    id="zotero-prefpane-zoteroAIRreader-enable"
    preference="enable"
    data-l10n-id="pref-enable"
  />
  <hbox>
    <html:label
      for="zotero-prefpane-zoteroAIRreader-api-url"
      data-l10n-id="pref-api-url"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-zoteroAIRreader-api-url"
      preference="apiUrl"
      placeholder="http://127.0.0.1:8765/api"
      style="width: 300px;"
    ></html:input>
  </hbox>
  <hbox class="virtualized-table-container" flex="1" height="300px">
    <html:div id="zoteroAIRreader-table-container" />
  </hbox>
</groupbox>
<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
